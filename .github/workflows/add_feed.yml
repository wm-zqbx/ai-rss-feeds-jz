name: Add Feed

on:
  issues:
    # Use `labeled` (not `opened`) because issue-form templates can apply labels
    # after the opened event fires, causing the label guard to skip silently.
    # Listening to `labeled` avoids that race.
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  add-feed:
    if: github.event.label.name == 'new-feed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_MODELS_TOKEN }}

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Extract URL from issue
        id: url
        run: |
          BODY='${{ github.event.issue.body }}'
          URL=$(echo "$BODY" | grep -oP 'https?://\S+' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Extracted URL: $URL"

      - name: Add feed (smart detection)
        id: add-feed
        shell: bash
        run: |
          set -eo pipefail
          # Snapshot the newest config BEFORE running (to detect whether a new one is created)
          PREV=$(ls -t configs/*.json 2>/dev/null | head -1 || echo "")
          echo "prev_config=$PREV" >> $GITHUB_OUTPUT
          bun run src/add-smart.ts "${{ steps.url.outputs.url }}" 2>&1 | tee /tmp/add-smart.log
          OUTPUT=$(cat /tmp/add-smart.log)
          NATIVE_URL=$(echo "$OUTPUT" | grep '^native_feed_url=' | sed 's/^native_feed_url=//' || true)
          if [ -n "$NATIVE_URL" ]; then
            echo "native_url=$NATIVE_URL" >> $GITHUB_OUTPUT
          fi
          # Identify the config created by this run, only if it's actually new
          NEW=$(ls -t configs/*.json 2>/dev/null | head -1 || echo "")
          if [ -n "$NEW" ] && [ "$NEW" != "$PREV" ]; then
            echo "config_name=$(basename "$NEW" .json)" >> $GITHUB_OUTPUT
            echo "Config created: $NEW"
          elif [ -z "$NATIVE_URL" ]; then
            echo "❌ add-smart.ts did not create a new config and no native feed was detected"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}

      - name: Update README
        run: bun run readme

      - name: Commit changes
        run: |
          git config --global user.name "ai-rss-feeds[bot]"
          git config --global user.email "ai-rss-feeds[bot]@users.noreply.github.com"
          git add configs/ feeds/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: add feed for ${{ steps.url.outputs.url }}"
            git push
          fi

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const configName = '${{ steps.add-feed.outputs.config_name }}' || '';
            const nativeUrl = '${{ steps.add-feed.outputs.native_url }}' || '';

            let body = '';
            if (configName && !nativeUrl) {
              body = `✅ Feed added successfully!\n\n📖 Subscribe: \`https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/feeds/${configName}.xml\``;
            } else if (nativeUrl) {
              body = `✅ Native RSS feed found — no copy needed.\n\n📖 Subscribe: \`${nativeUrl}\``;
            } else {
              body = `⚠️ Could not determine feed URL. Check workflow logs.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errorHint = '';
            try {
              const logContent = fs.readFileSync('/tmp/add-smart.log', 'utf8');
              if (logContent.includes('Cloudflare') || logContent.includes('cf-mitigated')) {
                errorHint = '\n\n⚠️ This site is protected by Cloudflare bot detection. Static HTTP requests cannot access it.';
              } else if (logContent.includes('No articles found')) {
                errorHint = '\n\n⚠️ The site structure could not be parsed. It may be a JavaScript-rendered SPA.';
              } else if (logContent.includes('No releases found')) {
                errorHint = '\n\n⚠️ No GitHub releases found for this repository.';
              }
            } catch (e) {}

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ Failed to add feed.${errorHint}\n\nPlease check the URL and try again, or open a manual PR.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
